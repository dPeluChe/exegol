[package]
name = "exegol-core-rust"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", features = ["full"] }
napi-derive = "3"
git2 = "0.19"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
memchr = "2"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
