<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' https://cdn.jsdelivr.net; script-src 'self' https://cdn.jsdelivr.net blob:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:; worker-src blob:; frame-src *; child-src *"
    />
    <title>Exegol</title>
    <style>
      body {
        margin: 0;
        background: #0a0a0b;
      }
      /* Splash screen — visible until React mounts and replaces #root content */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0b;
        z-index: 9999;
        animation: splash-fade-in 0.3s ease;
      }
      #splash pre {
        color: #6366f1;
        font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        font-size: 11px;
        line-height: 1.2;
        letter-spacing: 0.5px;
        text-align: center;
        margin: 0;
        user-select: none;
        text-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
      }
      #splash .tagline {
        color: #71717a;
        font-family: 'Inter', -apple-system, sans-serif;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 20px;
        user-select: none;
      }
      #splash .loader {
        margin-top: 24px;
        width: 120px;
        height: 2px;
        background: #1c1c1f;
        border-radius: 1px;
        overflow: hidden;
      }
      #splash .loader-bar {
        height: 100%;
        width: 40%;
        background: #6366f1;
        border-radius: 1px;
        animation: loader-slide 1.2s ease-in-out infinite;
      }
      @keyframes splash-fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes loader-slide {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(200%); }
        100% { transform: translateX(-100%); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <pre>
 _____ __  __ _____ ____  ___  _
| ____|\ \/ /| ____/ ___|/ _ \| |
|  _|   \  / |  _|| |  _| | | | |
| |___  /  \ | |__| |_| | |_| | |___
|_____|/_/\_\|_____\____|\___/|_____|</pre>
      <div class="tagline">orchestrate your agents</div>
      <div class="loader"><div class="loader-bar"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
